<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>🎯 Agent Panel</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a14;--sur:rgba(255,255,255,.045);--bdr:rgba(255,255,255,.08);--acc:#f59e0b;--grn:#10b981;--red:#ef4444;--tx:#e8e8f0;--dim:rgba(255,255,255,.38);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Outfit',sans-serif;background:var(--bg);min-height:100vh;color:var(--tx);}
.bg{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
.orb1{position:absolute;width:400px;height:400px;border-radius:50%;top:-100px;left:-70px;background:radial-gradient(circle,rgba(245,159,11,.1),transparent 70%);animation:d1 22s ease-in-out infinite alternate;}
.orb2{position:absolute;width:300px;height:300px;border-radius:50%;bottom:-80px;right:-50px;background:radial-gradient(circle,rgba(16,185,129,.07),transparent 70%);animation:d2 18s ease-in-out infinite alternate;}
@keyframes d1{to{transform:translate(40px,25px)}} @keyframes d2{to{transform:translate(-30px,-20px)}}
#app{position:relative;z-index:1;max-width:440px;margin:0 auto;padding:12px 13px 40px;}
.card{background:var(--sur);border:1px solid var(--bdr);border-radius:14px;padding:14px;margin-bottom:9px;}
.hdr{font-size:1.2rem;font-weight:900;background:linear-gradient(135deg,#f59e0b,#10b981);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:12px;}
.lbl{font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px;}
.sbox{background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:11px;}
.sv{font-size:1.2rem;font-weight:900;}.sl{font-size:9px;color:var(--dim);margin-top:2px;}
.btn{width:100%;padding:10px;border:none;border-radius:10px;font-family:'Outfit',sans-serif;
  font-weight:700;font-size:13px;cursor:pointer;color:#fff;transition:.14s;margin-bottom:6px;}
.btn:active{transform:scale(.96);}
.btn-grn{background:linear-gradient(135deg,#059669,#10b981);}
.btn-red{background:linear-gradient(135deg,#be123c,#ef4444);}
.btn-ylw{background:linear-gradient(135deg,#b45309,#f59e0b);}
.tabs{display:flex;gap:5px;margin-bottom:10px;overflow-x:auto;padding-bottom:2px;}
.tab{padding:7px 13px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:var(--dim);transition:.13s;}
.tab.on{background:rgba(245,159,11,.2);border-color:var(--acc);color:#fcd34d;}
.panel{display:none;}.panel.on{display:block;}
.row{padding:9px 0;border-bottom:1px solid rgba(255,255,255,.05);}
.row:last-child{border-bottom:none;}
.sub{font-size:10px;color:var(--dim);margin-top:2px;}
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700;}
.bg-ylw{background:rgba(245,184,0,.18);color:#fde68a;}
.bg-grn{background:rgba(16,185,129,.18);color:#6ee7b7;}
.bg-red{background:rgba(239,68,68,.18);color:#fca5a5;}
.ldr{text-align:center;color:var(--dim);padding:14px;font-size:13px;}
.ref-code{background:rgba(0,0,0,.3);border:1.5px dashed rgba(245,184,0,.3);border-radius:10px;
  padding:10px 12px;font-family:monospace;font-size:12px;font-weight:700;color:#fcd34d;word-break:break-all;margin-bottom:8px;}
/* Commission highlight */
.comm-banner{background:linear-gradient(135deg,rgba(245,159,11,.14),rgba(16,185,129,.09));
  border:1px solid rgba(245,159,11,.22);border-radius:13px;padding:14px;margin-bottom:10px;}
.comm-pct{font-size:2.2rem;font-weight:900;line-height:1;
  background:linear-gradient(135deg,#fcd34d,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
#toast{position:fixed;top:10px;left:50%;transform:translateX(-50%) translateY(-55px);z-index:999;transition:.3s cubic-bezier(.68,-.55,.265,1.55);opacity:0;}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
.ti{padding:8px 17px;border-radius:100px;font-size:12px;font-weight:700;box-shadow:0 6px 20px rgba(0,0,0,.4);}
.tok{background:rgba(16,185,129,.9);color:#fff;}.terr{background:rgba(239,68,68,.9);color:#fff;}
</style>
</head>
<body>
<div class="bg"><div class="orb1"></div><div class="orb2"></div></div>
<div id="toast"><div class="ti" id="tmsg"></div></div>
<div id="ldrMain" style="padding:50px 20px;text-align:center;color:rgba(255,255,255,.4);font-size:1rem;">⏳ စစ်ဆေးနေသည်...</div>
<div id="app" style="display:none;">
  <div class="hdr">🎯 Agent Panel</div>

  <!-- Commission Banner -->
  <div class="comm-banner">
    <div style="font-size:10px;color:var(--dim);margin-bottom:3px;text-transform:uppercase;letter-spacing:.06em;">Commission Rates</div>
    <div style="display:flex;gap:20px;align-items:center;">
      <div>
        <div class="comm-pct" id="depPct">0%</div>
        <div style="font-size:10px;color:var(--dim);margin-top:1px;">Deposit</div>
      </div>
      <div style="color:var(--dim);font-size:1.2rem;">+</div>
      <div>
        <div class="comm-pct" id="turnPct">0%</div>
        <div style="font-size:10px;color:var(--dim);margin-top:1px;">Turnover</div>
      </div>
    </div>
    <div style="font-size:11px;color:rgba(255,255,255,.4);margin-top:8px;line-height:1.6;">
      Referral User ငွေဖြည့်တိုင်း (Deposit %) + ဆော့တိုင်း (Turnover %) Commission ရမည်
    </div>
  </div>

  <!-- Stats -->
  <div class="stat-grid" id="statGrid"></div>

  <!-- Referral Link -->
  <div class="card" style="margin-bottom:10px;">
    <div class="lbl">🔗 Referral Link</div>
    <div class="ref-code" id="refCode">Loading...</div>
    <button class="btn btn-ylw" style="padding:9px;" onclick="copyRef()">📋 Link ကူးယူမည်</button>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab on" onclick="tab('deps',this)">💰 ငွေဖြည့်</div>
    <div class="tab"    onclick="tab('refs',this)">👥 Referrals</div>
  </div>

  <!-- Deposits -->
  <div class="panel on" id="pDeps">
    <div class="tabs" id="agDepTabs">
      <div class="tab on" onclick="loadDeps('pending',this)">⏳ Pending</div>
      <div class="tab"    onclick="loadDeps('confirmed',this)">✅ Confirmed</div>
      <div class="tab"    onclick="loadDeps('rejected',this)">❌ Rejected</div>
    </div>
    <div id="depList" class="ldr">Loading...</div>
  </div>

  <!-- Referrals -->
  <div class="panel" id="pRefs">
    <div id="refList" class="ldr">Loading...</div>
  </div>
</div>

<script>
const API = '__BACKEND_URL__';
const tg  = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

let agTid = null, agData = null;

function toast(msg, ok=true){
  const el=document.getElementById('toast'), t=document.getElementById('tmsg');
  t.textContent=msg; t.className='ti '+(ok?'tok':'terr');
  el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),2400);
}
async function post(path,body){ try{ const r=await fetch(API+path,{method:'POST',headers:{'Content-Type':'application/json','x-telegram-id':agTid},body:JSON.stringify(body)}); return r.json(); } catch(e){ return{error:e.message}; } }
async function get(path){ try{ return (await fetch(API+path,{headers:{'x-telegram-id':agTid}})).json(); } catch{ return null; } }

async function init(){
  const uid = tg?.initDataUnsafe?.user?.id;
  if(!uid){ document.getElementById('ldrMain').textContent='⚠️ Telegram မှ ဖွင့်ပါ'; return; }
  agTid = uid;
  const d = await get('/api/agent/panel');
  if(!d || d.error){ document.getElementById('ldrMain').innerHTML='🚫 Agent မဟုတ်သေးပါ<br><small style="color:var(--dim)">Admin ကို ဆက်သွယ်ပါ</small>'; return; }
  agData = d;

  document.getElementById('depPct').textContent  = (d.agentData?.depositPct ||0)+'%';
  document.getElementById('turnPct').textContent = (d.agentData?.turnoverPct||0)+'%';

  document.getElementById('statGrid').innerHTML=`
    <div class="sbox"><div class="sv" style="color:#fcd34d">${(d.balance||0).toLocaleString()}</div><div class="sl">💰 Balance</div></div>
    <div class="sbox"><div class="sv">${d.referralCount||0}</div><div class="sl">👥 Referrals</div></div>
    <div class="sbox"><div class="sv" style="color:#6ee7b7">${(d.agentData?.totalDepComm||0).toLocaleString()}</div><div class="sl">💳 Dep Comm</div></div>
    <div class="sbox"><div class="sv" style="color:#a78bfa">${(d.agentData?.totalTurnComm||0).toLocaleString()}</div><div class="sl">🎰 Turn Comm</div></div>
    <div class="sbox" style="grid-column:span 2;"><div class="sv" style="color:#fcd34d">${(d.agentData?.totalCommission||0).toLocaleString()}</div><div class="sl">💹 Total Commission Earned (MMK)</div></div>`;

  const link = `https://t.me/${d.botUsername||'mines_bot'}?start=${d.referralCode}`;
  document.getElementById('refCode').textContent = link;

  document.getElementById('ldrMain').style.display='none';
  document.getElementById('app').style.display='block';
  loadDeps('pending');
  loadRefs();
}

function copyRef(){ navigator.clipboard?.writeText(document.getElementById('refCode').textContent).then(()=>toast('✅ Link ကူးပြီ')); }

function tab(name, el){
  ['Deps','Refs'].forEach(n=>document.getElementById('p'+n).classList.remove('on'));
  document.getElementById('p'+name.charAt(0).toUpperCase()+name.slice(1)).classList.add('on');
  document.querySelectorAll('.tabs:not(#agDepTabs) .tab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
}

/* ── Deposits ──────────────────────────────────────────── */
async function loadDeps(status, el){
  if(el){ document.querySelectorAll('#agDepTabs .tab').forEach(t=>t.classList.remove('on')); el.classList.add('on'); }
  document.getElementById('depList').innerHTML='<div class="ldr">Loading...</div>';
  const list=await get(`/api/agent/deposits?status=${status}`);
  if(!list?.length){ document.getElementById('depList').innerHTML='<div class="ldr">မရှိသေးပါ</div>'; return; }
  document.getElementById('depList').innerHTML = list.map(d=>`
    <div class="row">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;">
        <div>
          <div style="font-weight:700;font-size:13px;">${d.userName||d.userId} <span class="badge bg-ylw">${(d.paymentMethod||'').toUpperCase()}</span></div>
          <div class="sub">💵 ${(d.amount||0).toLocaleString()} ကျပ် · 📝 ${d.kpayName||'—'}</div>
          <div class="sub" style="font-family:monospace;font-size:9px;">🔢 ${d.transactionId||'—'}</div>
          <div class="sub" style="color:#6ee7b7;">DepComm: +${Math.floor((d.amount||0)*(agData?.agentData?.depositPct||0)/100).toLocaleString()} ကျပ်</div>
        </div>
        <div class="sub">${new Date(d.createdAt).toLocaleDateString()}</div>
      </div>
      ${status==='pending'?`<div style="display:flex;gap:5px;margin-top:7px;">
        <button class="btn btn-grn" style="margin-bottom:0;padding:7px;font-size:11px;" onclick="confDep('${d._id}')">✅ Confirm</button>
        <button class="btn btn-red" style="margin-bottom:0;padding:7px;font-size:11px;" onclick="rejDep('${d._id}')">❌ Reject</button>
      </div>`:''}
    </div>`).join('');
}
async function confDep(id){
  if(!confirm('ဒီ Deposit Confirm လုပ်မည်?\n(သင့် Balance မှ နှုတ်ပြီး User ထံ ပေးမည်)')) return;
  const r=await post(`/api/agent/deposits/${id}/confirm`,{});
  r.ok?(toast('✅ Confirmed!'),loadDeps('pending'),init()):toast(r.error||'Error',false);
}
async function rejDep(id){ const reason=prompt('Reason (optional):'); const r=await post(`/api/agent/deposits/${id}/reject`,{reason}); r.ok?(toast('❌ Rejected'),loadDeps('pending')):toast(r.error||'Error',false); }

/* ── Referrals ─────────────────────────────────────────── */
async function loadRefs(){
  const d=await get('/api/agent/referrals');
  const el=document.getElementById('refList');
  if(!d?.referrals?.length){ el.innerHTML='<div class="ldr">Referral မရှိသေးပါ</div>'; return; }
  el.innerHTML=`<div style="font-size:12px;color:var(--dim);margin-bottom:8px;">စုစုပေါင်း <b style="color:#fcd34d;">${d.total}</b> ယောက်</div>`+
    d.referrals.map(u=>`
      <div class="row">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <div>
            <div style="font-size:13px;font-weight:700;">${u.name||'Unknown'}</div>
            <div class="sub">@${u.username||'—'} · 🎮 ${u.gamesPlayed||0} rounds</div>
            <div class="sub">${new Date(u.joinedAt).toLocaleDateString()} မှ</div>
          </div>
          <div style="text-align:right;">
            <div style="font-weight:800;color:#fcd34d;font-size:12px;">${(u.balance||0).toLocaleString()}</div>
            <div class="sub">Balance</div>
          </div>
        </div>
      </div>`).join('');
}

init();
</script>
</body>
</html>
