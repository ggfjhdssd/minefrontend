<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>🎯 Agent Panel</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="config.js"></script>
<style>
:root{--bg:#0a0a14;--sur:rgba(255,255,255,.05);--bdr:rgba(255,255,255,.09);--acc:#f59e0b;--grn:#10b981;--red:#ef4444;--tx:#e8e8f0;--dim:rgba(255,255,255,.4);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Outfit',sans-serif;background:var(--bg);min-height:100vh;color:var(--tx);padding:12px;max-width:500px;margin:0 auto;}
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap');
.card{background:var(--sur);border:1px solid var(--bdr);border-radius:14px;padding:14px;margin-bottom:9px;}
.hdr{font-size:1.2rem;font-weight:900;background:linear-gradient(135deg,#f59e0b,#10b981);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:12px;}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px;}
.sbox{background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:11px;}
.sv{font-size:1.15rem;font-weight:900;}.sl{font-size:9px;color:var(--dim);margin-top:2px;}
.btn{width:100%;padding:10px;border:none;border-radius:10px;font-family:'Outfit',sans-serif;font-weight:700;font-size:13px;cursor:pointer;color:#fff;margin-bottom:6px;transition:.14s;}
.btn:active{transform:scale(.96);}
.bg{background:linear-gradient(135deg,#059669,#10b981);}
.br{background:linear-gradient(135deg,#be123c,#ef4444);}
.by{background:linear-gradient(135deg,#b45309,#f59e0b);}
.tabs{display:flex;gap:5px;margin-bottom:10px;overflow-x:auto;padding-bottom:2px;}
.tab{padding:7px 13px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:var(--dim);transition:.13s;}
.tab.on{background:rgba(245,159,11,.2);border-color:var(--acc);color:#fcd34d;}
.pn{display:none;}.pn.on{display:block;}
.row{padding:9px 0;border-bottom:1px solid rgba(255,255,255,.05);}
.row:last-child{border-bottom:none;}
.sub{font-size:10px;color:var(--dim);margin-top:2px;}
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700;}
.by2{background:rgba(245,184,0,.18);color:#fde68a;}
.ref-box{background:rgba(0,0,0,.3);border:1.5px dashed rgba(245,184,0,.3);border-radius:11px;padding:11px 13px;font-family:monospace;font-size:12px;font-weight:700;color:#fcd34d;word-break:break-all;margin-bottom:9px;}
.comm-box{background:linear-gradient(135deg,rgba(245,159,11,.14),rgba(16,185,129,.09));border:1px solid rgba(245,159,11,.22);border-radius:13px;padding:14px;margin-bottom:10px;}
.ldr{text-align:center;color:var(--dim);padding:14px;font-size:13px;}
#toast{position:fixed;top:10px;left:50%;transform:translateX(-50%) translateY(-55px);z-index:999;transition:.3s cubic-bezier(.68,-.55,.265,1.55);opacity:0;}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
.ti{padding:8px 17px;border-radius:100px;font-size:12px;font-weight:700;box-shadow:0 6px 20px rgba(0,0,0,.4);}
.tok{background:rgba(16,185,129,.9);color:#fff;}.terr{background:rgba(239,68,68,.9);color:#fff;}
</style>
</head>
<body>
<div id="toast"><div class="ti" id="tm"></div></div>
<div id="err" style="display:none;padding:50px 20px;text-align:center;color:#fca5a5;font-size:14px;line-height:1.7;"></div>
<div id="app" style="display:none;">
  <div class="hdr">🎯 Agent Panel</div>

  <div class="comm-box">
    <div style="font-size:10px;color:var(--dim);margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em;">Commission Rates</div>
    <div style="display:flex;gap:20px;align-items:center;">
      <div><div style="font-size:2rem;font-weight:900;background:linear-gradient(135deg,#fcd34d,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;" id="depPct">0%</div><div style="font-size:10px;color:var(--dim);">Deposit</div></div>
      <div style="color:var(--dim);font-size:1.2rem;">+</div>
      <div><div style="font-size:2rem;font-weight:900;background:linear-gradient(135deg,#fcd34d,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;" id="turnPct">0%</div><div style="font-size:10px;color:var(--dim);">Turnover</div></div>
    </div>
    <div style="font-size:11px;color:rgba(255,255,255,.4);margin-top:8px;line-height:1.6;">ဖြည့်တိုင်း Deposit% + ဆော့တိုင်း Turnover% Commission Auto ရမည်</div>
  </div>

  <div class="sg" id="sg"></div>

  <div class="card mb-10" style="margin-bottom:10px;">
    <div style="font-size:11px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;">🔗 Referral Link</div>
    <div class="ref-box" id="refCode">—</div>
    <button class="btn by" style="padding:9px;" onclick="copyRef()">📋 Link ကူးယူမည်</button>
  </div>

  <div class="tabs">
    <div class="tab on" onclick="tab('dep',this)">💰 ငွေဖြည့်</div>
    <div class="tab"    onclick="tab('ref',this)">👥 Referrals</div>
  </div>

  <div class="pn on" id="pDep">
    <div class="tabs" id="adtabs"><div class="tab on" onclick="ldep('pending',this)">⏳ Pending</div><div class="tab" onclick="ldep('confirmed',this)">✅ Done</div><div class="tab" onclick="ldep('rejected',this)">❌ Rejected</div></div>
    <div id="depList" class="ldr">Loading...</div>
  </div>
  <div class="pn" id="pRef">
    <div id="refList" class="ldr">Loading...</div>
  </div>
</div>

<script>
const API=typeof BACKEND_URL!=='undefined'?BACKEND_URL:'';
const tg=window.Telegram?.WebApp;
if(tg){tg.ready();tg.expand();}
let atid=null;

function toast(msg,ok=true){const el=document.getElementById('toast'),t=document.getElementById('tm');t.textContent=msg;t.className='ti '+(ok?'tok':'terr');el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2400);}
async function go(path,body){try{const r=await fetch(API+path,{method:'POST',headers:{'Content-Type':'application/json','x-telegram-id':atid},body:JSON.stringify(body)});const txt=await r.text();try{return JSON.parse(txt);}catch{return{error:txt.slice(0,80)};}}catch(e){return{error:e.message};}}
async function get(path){try{const r=await fetch(API+path,{headers:{'x-telegram-id':atid}});const txt=await r.text();try{return JSON.parse(txt);}catch{return null;}}catch{return null;}}

async function init(){
  const uid=tg?.initDataUnsafe?.user?.id;
  if(!uid){document.getElementById('err').innerHTML='⚠️ Telegram မှ ဖွင့်ပါ';document.getElementById('err').style.display='block';return;}
  atid=uid;
  const d=await get('/api/agent/panel');
  if(!d||d.error){document.getElementById('err').innerHTML='🚫 Agent မဟုတ်သေးပါ<br><small style="color:var(--dim)">Admin ကို ဆက်သွယ်ပါ</small>';document.getElementById('err').style.display='block';return;}
  document.getElementById('depPct').textContent=(d.agentData?.depositPct||0)+'%';
  document.getElementById('turnPct').textContent=(d.agentData?.turnoverPct||0)+'%';
  document.getElementById('sg').innerHTML=`
    <div class="sbox"><div class="sv" style="color:#fcd34d">${(d.balance||0).toLocaleString()}</div><div class="sl">💰 Balance</div></div>
    <div class="sbox"><div class="sv">${d.referralCount||0}</div><div class="sl">👥 Referrals</div></div>
    <div class="sbox"><div class="sv" style="color:#6ee7b7">${(d.agentData?.totalDepComm||0).toLocaleString()}</div><div class="sl">💳 Dep Comm</div></div>
    <div class="sbox"><div class="sv" style="color:#a78bfa">${(d.agentData?.totalTurnComm||0).toLocaleString()}</div><div class="sl">🎰 Turn Comm</div></div>
    <div class="sbox" style="grid-column:span 2;"><div class="sv" style="color:#fcd34d">${(d.agentData?.totalCommission||0).toLocaleString()}</div><div class="sl">💹 Total Commission (MMK)</div></div>`;
  const link=`https://t.me/${d.botUsername||'mines_bot'}?start=${d.referralCode}`;
  document.getElementById('refCode').textContent=link;
  document.getElementById('app').style.display='block';
  ldep('pending');lref();
}
function copyRef(){navigator.clipboard?.writeText(document.getElementById('refCode').textContent).then(()=>toast('✅ Link ကူးပြီ'));}

function tab(n,el){['Dep','Ref'].forEach(x=>document.getElementById('p'+x).classList.remove('on'));document.getElementById('p'+n.charAt(0).toUpperCase()+n.slice(1)).classList.add('on');document.querySelectorAll('.tabs:not(#adtabs) .tab').forEach(t=>t.classList.remove('on'));el.classList.add('on');}

async function ldep(st,el){
  if(el){document.querySelectorAll('#adtabs .tab').forEach(t=>t.classList.remove('on'));el.classList.add('on');}
  document.getElementById('depList').innerHTML='<div class="ldr">Loading...</div>';
  const list=await get(`/api/agent/deposits?status=${st}`);
  if(!list?.length){document.getElementById('depList').innerHTML='<div class="ldr">မရှိသေးပါ</div>';return;}
  document.getElementById('depList').innerHTML=list.map(d=>`
    <div class="row">
      <div style="display:flex;justify-content:space-between;">
        <div><div style="font-weight:700;font-size:13px;">${d.userName||d.userId} <span class="badge by2">${(d.paymentMethod||'').toUpperCase()}</span></div>
        <div class="sub">💵 ${(d.amount||0).toLocaleString()} ကျပ် · 📝 ${d.kpayName||'—'}</div>
        <div class="sub" style="font-family:monospace;font-size:9px;">🔢 ${d.transactionId||'—'}</div></div>
        <div class="sub">${new Date(d.createdAt).toLocaleDateString()}</div>
      </div>
      ${st==='pending'?`<div style="display:flex;gap:5px;margin-top:7px;">
        <button class="btn bg" style="margin-bottom:0;padding:7px;font-size:11px;" onclick="cdep('${d._id}')">✅ Confirm</button>
        <button class="btn br" style="margin-bottom:0;padding:7px;font-size:11px;" onclick="rdep('${d._id}')">❌ Reject</button>
      </div>`:''}
    </div>`).join('');
}
async function cdep(id){if(!confirm('Confirm?\n(သင့် Balance မှ နှုတ်ပြီး User ထံ ပို့မည်)'))return;const r=await go(`/api/agent/deposits/${id}/confirm`,{});r.ok?(toast('✅ Confirmed!'),ldep('pending'),init()):toast(r.error||'Err',false);}
async function rdep(id){const reason=prompt('Reason:');const r=await go(`/api/agent/deposits/${id}/reject`,{reason});r.ok?(toast('❌ Rejected'),ldep('pending')):toast(r.error||'Err',false);}

async function lref(){
  const d=await get('/api/agent/referrals');
  const el=document.getElementById('refList');
  if(!d?.referrals?.length){el.innerHTML='<div class="ldr">Referral မရှိသေးပါ</div>';return;}
  el.innerHTML=`<div style="font-size:12px;color:var(--dim);margin-bottom:8px;">စုစုပေါင်း <b style="color:#fcd34d;">${d.total}</b> ယောက်</div>`+
    d.referrals.map(u=>`<div class="row"><div style="display:flex;justify-content:space-between;align-items:center;"><div><div style="font-size:13px;font-weight:700;">${u.name||'Unknown'}</div><div class="sub">@${u.username||'—'} · 🎮 ${u.gamesPlayed||0}</div></div><div style="text-align:right;"><div style="font-weight:800;color:#fcd34d;font-size:12px;">${(u.balance||0).toLocaleString()}</div><div class="sub">Balance</div></div></div></div>`).join('');
}
init();
</script>
</body>
</html>
