<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>💣 Mines Game</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="config.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a14;--sur:rgba(255,255,255,.05);--bdr:rgba(255,255,255,.09);--acc:#f59e0b;--grn:#10b981;--red:#ef4444;--tx:#e8e8f0;--dim:rgba(255,255,255,.4);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Outfit',sans-serif;background:var(--bg);min-height:100vh;color:var(--tx);}
.bg{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
.orb1{position:absolute;width:500px;height:500px;border-radius:50%;top:-150px;left:-100px;background:radial-gradient(circle,rgba(245,159,11,.12),transparent 70%);animation:d1 22s ease-in-out infinite alternate;}
.orb2{position:absolute;width:400px;height:400px;border-radius:50%;bottom:-120px;right:-80px;background:radial-gradient(circle,rgba(239,68,68,.08),transparent 70%);animation:d2 18s ease-in-out infinite alternate;}
@keyframes d1{to{transform:translate(60px,40px)}} @keyframes d2{to{transform:translate(-50px,-30px)}}
#ldr{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:24px;}
.ldr-icon{font-size:3.5rem;animation:pulse 1.2s ease-in-out infinite alternate;}
@keyframes pulse{to{transform:scale(1.15)}}
.ldr-title{font-size:2rem;font-weight:900;background:linear-gradient(135deg,#f59e0b,#ef4444);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.spin{width:28px;height:28px;border:3px solid rgba(255,255,255,.1);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
#app{position:relative;z-index:1;max-width:440px;margin:0 auto;padding:12px 13px 48px;display:none;}
.card{background:var(--sur);border:1px solid var(--bdr);border-radius:18px;backdrop-filter:blur(16px);padding:16px;}
.mb10{margin-bottom:10px;}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.logo{font-size:1.2rem;font-weight:900;background:linear-gradient(135deg,#f59e0b,#ef4444);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.icon-btn{background:var(--sur);border:1px solid var(--bdr);border-radius:10px;padding:9px;cursor:pointer;display:flex;transition:.15s;}
.icon-btn:active{transform:scale(.9);}
.bal-card{background:linear-gradient(135deg,rgba(245,159,11,.15),rgba(239,68,68,.1));border:1px solid rgba(245,159,11,.24);border-radius:18px;padding:18px;margin-bottom:10px;position:relative;overflow:hidden;}
.bal-card::after{content:'💣';position:absolute;right:14px;top:10px;font-size:3.5rem;opacity:.12;pointer-events:none;}
.bal-lbl{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;}
.bal-num{font-size:2.8rem;font-weight:900;background:linear-gradient(135deg,#fcd34d,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.bal-sub{font-size:12px;color:var(--dim);margin-top:2px;}
.bal-acts{display:flex;gap:8px;margin-top:12px;}
.bal-btn{flex:1;padding:9px;border-radius:10px;border:none;font-family:'Outfit',sans-serif;font-weight:700;font-size:12px;cursor:pointer;transition:.14s;}
.dep-btn{background:rgba(16,185,129,.18);color:#6ee7b7;border:1px solid rgba(16,185,129,.3);}
.wd-btn{background:rgba(245,184,0,.15);color:#fde68a;border:1px solid rgba(245,184,0,.3);}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px;}
.stat{background:var(--sur);border:1px solid var(--bdr);border-radius:13px;padding:11px 7px;text-align:center;}
.sv{font-size:1.3rem;font-weight:900;}.sl{font-size:9px;color:var(--dim);text-transform:uppercase;margin-top:3px;}
.btn{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;padding:14px;font-family:'Outfit',sans-serif;font-weight:800;font-size:15px;border:none;border-radius:13px;color:#fff;cursor:pointer;transition:all .15s;}
.btn:active{transform:scale(.96);}
.btn-play{background:linear-gradient(135deg,#d97706,#ef4444);box-shadow:0 6px 22px rgba(239,100,0,.3);}
.btn-grn{background:linear-gradient(135deg,#059669,#10b981);}
.btn-ylw{background:linear-gradient(135deg,#b45309,#f59e0b);}
.collapse-btn{width:100%;padding:11px 14px;background:rgba(255,255,255,.05);border:1px solid var(--bdr);border-radius:12px;color:var(--tx);font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;cursor:pointer;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;transition:.15s;}
.panel{overflow:hidden;max-height:0;opacity:0;transition:max-height .4s cubic-bezier(.4,0,.2,1),opacity .3s;pointer-events:none;}
.panel.open{max-height:700px;opacity:1;margin-bottom:10px;pointer-events:auto;}
.lbl{font-size:11px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;}
.inp{width:100%;padding:11px 13px;background:rgba(0,0,0,.25);border:1.5px solid var(--bdr);border-radius:11px;color:var(--tx);font-family:'Outfit',sans-serif;font-size:14px;outline:none;transition:.2s;}
.inp:focus{border-color:var(--acc);}
.inp::placeholder{color:rgba(255,255,255,.2);}
.gap{display:flex;flex-direction:column;gap:9px;}
.kbox{background:rgba(0,0,0,.2);border:1px solid rgba(245,184,0,.2);border-radius:12px;padding:12px;margin-bottom:9px;}
.krow{display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,.04);border:1px solid var(--bdr);border-radius:9px;padding:10px 12px;margin-bottom:6px;}
.knum{font-family:monospace;font-size:1.1rem;font-weight:700;letter-spacing:.05em;}
.copy-btn{background:rgba(245,184,0,.15);color:#fde68a;border:none;border-radius:7px;padding:5px 10px;font-size:11px;font-weight:700;cursor:pointer;}
.mth-row{display:flex;gap:7px;margin-bottom:9px;}
.mth{flex:1;padding:9px;border-radius:10px;border:2px solid transparent;font-family:'Outfit',sans-serif;font-weight:700;font-size:12px;cursor:pointer;background:var(--sur);color:var(--dim);transition:.15s;}
.mth.on{background:rgba(245,159,11,.2);border-color:var(--acc);color:#fcd34d;}
.ref-code{background:rgba(0,0,0,.3);border:1.5px dashed rgba(245,184,0,.3);border-radius:11px;padding:11px 13px;font-family:monospace;font-size:12px;font-weight:700;color:#fcd34d;word-break:break-all;margin-bottom:9px;}
.hist-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.05);}
.hist-row:last-child{border-bottom:none;}
.hi-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;}
#toast{position:fixed;top:12px;left:50%;transform:translateX(-50%) translateY(-70px);z-index:9999;transition:all .36s cubic-bezier(.68,-.55,.265,1.55);opacity:0;pointer-events:none;}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
.ti{padding:10px 20px;border-radius:100px;font-size:13px;font-weight:700;backdrop-filter:blur(20px);display:flex;align-items:center;gap:6px;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.4);}
.t-ok{background:rgba(16,185,129,.9);border:1px solid #34d399;color:#fff;}
.t-err{background:rgba(239,68,68,.9);border:1px solid #f87171;color:#fff;}
</style>
</head>
<body>
<div class="bg"><div class="orb1"></div><div class="orb2"></div></div>
<div id="ldr">
  <div class="ldr-icon">💣</div>
  <div class="ldr-title">Mines</div>
  <div style="font-size:11px;color:var(--dim);margin-top:-8px;">ချိတ်ဆက်နေသည်...</div>
  <div class="spin"></div>
</div>
<div id="toast"><div class="ti" id="tmsg"></div></div>

<div id="app">
  <div class="hdr">
    <div class="logo">💣 Mines Game</div>
    <button class="icon-btn" onclick="refresh()">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"></path></svg>
    </button>
  </div>

  <div class="bal-card">
    <div class="bal-lbl">💰 လက်ကျန်ငွေ</div>
    <div class="bal-num" id="balNum">0</div>
    <div class="bal-sub">ကျပ် (MMK)</div>
    <div class="bal-acts">
      <button class="bal-btn dep-btn" onclick="openPanel('dep')">＋ ငွေဖြည့်</button>
      <button class="bal-btn wd-btn"  onclick="openPanel('wd')">↑ ငွေထုတ်</button>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="sv" id="stGames">0</div><div class="sl">ပွဲ</div></div>
    <div class="stat"><div class="sv" id="stWon" style="color:var(--grn)">0</div><div class="sl">Win</div></div>
    <div class="stat"><div class="sv" id="stLost" style="color:var(--red)">0</div><div class="sl">Lose</div></div>
  </div>

  <button class="btn btn-play mb10" onclick="goPlay()" style="font-size:1.1rem;padding:16px;">💣 Mines ကစားမည်</button>

  <!-- Deposit Panel -->
  <button class="collapse-btn" onclick="togglePanel('dep')">
    <span>💳 ငွေဖြည့်ရန်</span>
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"></polyline></svg>
  </button>
  <div class="panel" id="pDep">
    <div class="card">
      <div class="kbox">
        <div id="payTag" style="display:inline-block;font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px;background:rgba(245,159,11,.15);color:#fcd34d;border:1px solid rgba(245,159,11,.25);margin-bottom:8px;">📱 KPay</div>
        <div class="krow">
          <div><div style="font-size:10px;color:var(--dim);margin-bottom:2px;">KPay နံပါတ်</div><div class="knum" id="kpayNum">—</div></div>
          <button class="copy-btn" onclick="copyTxt('kpayNum')">Copy</button>
        </div>
        <div style="font-size:11px;color:var(--dim);">အမည်: <b id="kpayName">—</b></div>
      </div>
      <div class="mth-row">
        <button class="mth on" id="mKpay" onclick="setDM('kpay')">📱 KPay</button>
        <button class="mth"    id="mWave" onclick="setDM('wave')">🌊 Wave</button>
      </div>
      <div class="gap">
        <div><div class="lbl">ပေးပို့သူ အမည်</div><input class="inp" id="dName" placeholder="သင့်အမည်"></div>
        <div><div class="lbl">Transaction ID</div><input class="inp" id="dTxn" placeholder="1234567890"></div>
        <div><div class="lbl">ပမာဏ (ကျပ်)</div><input class="inp" id="dAmt" type="number" placeholder="5000"></div>
        <button class="btn btn-grn" onclick="submitDep()">✅ တောင်းဆိုမည်</button>
      </div>
    </div>
  </div>

  <!-- Withdraw Panel -->
  <button class="collapse-btn" onclick="togglePanel('wd')">
    <span>💸 ငွေထုတ်ရန် (min 2,500 ကျပ်)</span>
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"></polyline></svg>
  </button>
  <div class="panel" id="pWd">
    <div class="card">
      <div class="gap">
        <div><div class="lbl">KPay/Wave အမည်</div><input class="inp" id="wName" placeholder="သင့်အမည်"></div>
        <div><div class="lbl">KPay/Wave နံပါတ်</div><input class="inp" id="wNum" placeholder="09xxxxxxxxx"></div>
        <div><div class="lbl">ပမာဏ (ကျပ်)</div><input class="inp" id="wAmt" type="number" placeholder="2500"></div>
        <div class="mth-row">
          <button class="mth on" id="wMKpay" onclick="setWM('kpay')">📱 KPay</button>
          <button class="mth"    id="wMWave" onclick="setWM('wave')">🌊 Wave</button>
        </div>
        <button class="btn btn-ylw" onclick="submitWd()">💸 တောင်းဆိုမည်</button>
      </div>
    </div>
  </div>

  <!-- Referral Panel -->
  <button class="collapse-btn" onclick="togglePanel('ref')">
    <span>🔗 Referral Link</span>
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"></polyline></svg>
  </button>
  <div class="panel" id="pRef">
    <div class="card">
      <div style="font-size:12px;color:var(--dim);line-height:1.7;margin-bottom:9px;">မိတ်ဆွေ ဆော့တိုင်း/ဖြည့်တိုင်း <b style="color:#fcd34d;">Commission</b> ရမည်!</div>
      <div class="ref-code" id="refCode">—</div>
      <button class="btn btn-ylw" style="padding:10px;" onclick="copyRef()">📋 Link ကူးယူမည်</button>
      <div id="refStats" style="margin-top:9px;font-size:12px;color:var(--dim);"></div>
    </div>
  </div>

  <!-- Promo Code Panel -->
  <button class="collapse-btn" onclick="togglePanel('promo')">
    <span>🎟️ Promo Code</span>
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"></polyline></svg>
  </button>
  <div class="panel" id="pPromo">
    <div class="card">
      <div style="display:flex;gap:8px;">
        <input class="inp" id="promoCode" placeholder="CODE" style="text-transform:uppercase;flex:1;">
        <button class="btn btn-grn" style="width:auto;padding:11px 16px;" onclick="redeemCode()">✅</button>
      </div>
    </div>
  </div>

  <!-- History -->
  <div class="card mb10">
    <div style="font-size:11px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;margin-bottom:9px;">🕐 ကစားမှတ်တမ်း</div>
    <div id="histList"><div style="text-align:center;color:var(--dim);font-size:13px;padding:10px 0;">မှတ်တမ်း မရှိသေးပါ</div></div>
  </div>
</div>

<script>
const API = typeof BACKEND_URL !== 'undefined' ? BACKEND_URL : '';
const tg  = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

let me=null, payInfo=null, depM='kpay', wdM='kpay';

/* toast */
function toast(msg,ok=true,ms=2400){
  const el=document.getElementById('toast'),t=document.getElementById('tmsg');
  t.textContent=msg; t.className='ti '+(ok?'t-ok':'t-err');
  el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),ms);
}

/* fetch helpers */
async function api(path,body){
  try{
    const r=await fetch(API+path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const txt=await r.text();
    try{return JSON.parse(txt);}
    catch{return{error:'Backend မှ မမှန်သော response ရသည်: '+txt.slice(0,60)};}
  }catch(e){return{error:'Backend ချိတ်ဆက်မရပါ: '+e.message};}
}
async function get(path){
  try{const r=await fetch(API+path);const txt=await r.text();try{return JSON.parse(txt);}catch{return null;}}
  catch{return null;}
}

/* init */
async function init(){
  if(!API){return fatal('config.js ထဲ BACKEND_URL ထည့်ပါ');}

  // Health check
  const h=await get('/health');
  if(!h?.ok){
    return fatal(
      '<div style="font-size:1.2rem;margin-bottom:8px;">🔴 Backend ချိတ်ဆက်မရပါ</div>'+
      '<div style="font-size:11px;color:#fca5a5;margin-bottom:10px;">Render Service ကို စစ်ဆေးပါ</div>'+
      '<div style="background:rgba(0,0,0,.35);border-radius:9px;padding:9px;word-break:break-all;margin-bottom:12px;">'+
        '<div style="font-size:9px;color:rgba(255,255,255,.4);margin-bottom:3px;">URL:</div>'+
        '<div style="font-family:monospace;font-size:11px;color:#fcd34d;">'+API+'</div>'+
      '</div>'+
      '<div style="font-size:11px;color:rgba(255,255,255,.5);line-height:1.8;">'+
        '① Render → service → ♺ Manual Deploy<br>'+
        '② ၁ မိနစ် စောင့်ပြီး ↓ Retry<br>'+
        '③ config.js ထဲ URL မှန်မမှန် စစ်ပါ'+
      '</div>'+
      '<button onclick="location.reload()" style="margin-top:12px;background:#f59e0b;border:none;color:#000;padding:9px 22px;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;">🔄 Retry</button>'
    );
  }

  const body=tg?.initDataUnsafe?.user?{initData:tg.initData}:{telegramId:'12345'};
  const r=await api('/api/auth',body);
  if(!r.ok) return fatal(r.error||'Auth မအောင်မြင်ပါ');
  me=r;
  document.getElementById('balNum').textContent=(me.balance||0).toLocaleString();
  document.getElementById('stGames').textContent=me.gamesPlayed||0;
  const botUser=new URLSearchParams(location.search).get('bot')||'mines_bot';
  document.getElementById('refCode').textContent=`https://t.me/${botUser}?start=${me.referralCode}`;
  await Promise.all([loadPayInfo(),loadHistory(),loadRefStats()]);
  document.getElementById('ldr').style.opacity='0';
  setTimeout(()=>{document.getElementById('ldr').style.display='none';document.getElementById('app').style.display='block';},300);
}

function fatal(msg){
  document.getElementById('ldr').innerHTML=
    '<div style="max-width:300px;text-align:center;padding:0 16px;">'+
    '<div style="font-size:2.5rem;margin-bottom:8px;">⚠️</div>'+
    '<div style="color:#fca5a5;font-size:14px;line-height:1.6;">'+msg+'</div>'+
    '</div>';
}

async function refresh(){
  if(!me) return init();
  const u=await get(`/api/user/${me.telegramId}`);
  if(u?.ok!==false){me.balance=u.balance||me.balance;document.getElementById('balNum').textContent=(me.balance||0).toLocaleString();}
  await loadHistory();
  toast('✅ Refreshed');
}

async function loadPayInfo(){
  if(!me) return;
  payInfo=await get(`/api/payment-info/${me.telegramId}`);
  if(!payInfo) return;
  document.getElementById('kpayNum').textContent=payInfo.kpayNumber||'—';
  document.getElementById('kpayName').textContent=payInfo.kpayName||'—';
  document.getElementById('payTag').textContent=payInfo.isAgent?'🎯 Agent KPay':'📱 KPay';
  if(!payInfo.hasWave) document.getElementById('mWave').style.display='none';
}

async function loadHistory(){
  if(!me) return;
  const list=await get(`/api/mines/history/${me.telegramId}`);
  const el=document.getElementById('histList');
  if(!Array.isArray(list)||!list.length) return;
  let wins=0,losses=0;
  el.innerHTML=list.map(g=>{
    const won=g.status==='cashout';
    won?wins++:losses++;
    const profit=won?g.payout-g.betAmount:-g.betAmount;
    return `<div class="hist-row">
      <div style="display:flex;align-items:center;gap:8px;">
        <div class="hi-icon" style="background:rgba(${won?'16,185,129':'239,68,68'},.15);">${won?'💵':'💣'}</div>
        <div>
          <div style="font-size:12px;font-weight:700;">${(g.betAmount||0).toLocaleString()} · ${g.bombCount}💣</div>
          <div style="font-size:10px;color:var(--dim);">${g.revealedTiles?.length||0}ကွက် · ${won?(g.multiplier||0).toFixed(2)+'×':'ထိ'}</div>
        </div>
      </div>
      <div style="font-weight:800;font-size:12px;color:${won?'#6ee7b7':'#fca5a5'};">${profit>=0?'+':''}${Math.abs(profit).toLocaleString()}</div>
    </div>`;
  }).join('');
  document.getElementById('stWon').textContent=wins;
  document.getElementById('stLost').textContent=losses;
}

async function loadRefStats(){
  if(!me) return;
  const r=await get(`/api/referrals/${me.telegramId}`);
  if(r?.total) document.getElementById('refStats').textContent=`မိတ်ဆွေ ${r.total} ယောက်`;
}

/* panels */
const panelMap={dep:'pDep',wd:'pWd',ref:'pRef',promo:'pPromo'};
let openP=null;
function togglePanel(k){const id=panelMap[k];if(!id) return;const el=document.getElementById(id);if(openP&&openP!==id)document.getElementById(openP).classList.remove('open');el.classList.toggle('open');openP=el.classList.contains('open')?id:null;if(k==='dep')loadPayInfo();}
function openPanel(k){const id=panelMap[k];if(!id) return;const el=document.getElementById(id);if(openP&&openP!==id)document.getElementById(openP).classList.remove('open');el.classList.add('open');openP=id;if(k==='dep')loadPayInfo();}

/* payment methods */
function setDM(m){depM=m;document.getElementById('mKpay').classList.toggle('on',m==='kpay');document.getElementById('mWave').classList.toggle('on',m==='wave');if(payInfo){document.getElementById('kpayNum').textContent=m==='wave'?(payInfo.waveNumber||'—'):(payInfo.kpayNumber||'—');document.getElementById('kpayName').textContent=m==='wave'?(payInfo.waveName||'—'):(payInfo.kpayName||'—');}}
function setWM(m){wdM=m;document.getElementById('wMKpay').classList.toggle('on',m==='kpay');document.getElementById('wMWave').classList.toggle('on',m==='wave');}
function copyTxt(id){navigator.clipboard?.writeText(document.getElementById(id)?.textContent).then(()=>toast('✅ ကူးပြီ'));}
function copyRef(){navigator.clipboard?.writeText(document.getElementById('refCode').textContent).then(()=>toast('✅ Link ကူးပြီ'));}

/* deposit */
async function submitDep(){
  const n=document.getElementById('dName').value.trim(),t=document.getElementById('dTxn').value.trim(),a=parseInt(document.getElementById('dAmt').value);
  if(!n||!t||!a) return toast('ကွင်းလပ်တွေ ဖြည့်ပေးပါ',false);
  if(a<500) return toast('အနည်းဆုံး 500 ကျပ်',false);
  const r=await api('/api/deposit',{telegramId:me.telegramId,kpayName:n,transactionId:t,amount:a,paymentMethod:depM});
  r.ok?(toast('✅ ငွေဖြည့် တောင်းဆိုမှု ပေးပို့ပြီ'),document.getElementById('dName').value='',document.getElementById('dTxn').value='',document.getElementById('dAmt').value=''):toast(r.error||'Error',false);
}

/* withdraw */
async function submitWd(){
  const n=document.getElementById('wName').value.trim(),num=document.getElementById('wNum').value.trim(),a=parseInt(document.getElementById('wAmt').value);
  if(!n||!num||!a) return toast('ကွင်းလပ်တွေ ဖြည့်ပေးပါ',false);
  if(a<2500) return toast('အနည်းဆုံး 2,500 ကျပ်',false);
  const r=await api('/api/withdraw',{telegramId:me.telegramId,kpayName:n,kpayNumber:num,amount:a,paymentMethod:wdM});
  if(r.ok){me.balance=r.newBalance;document.getElementById('balNum').textContent=(r.newBalance||0).toLocaleString();toast('✅ ငွေထုတ် တောင်းဆိုမှု ပေးပို့ပြီ');}else toast(r.error||'Error',false);
}

/* redeem */
async function redeemCode(){
  const code=document.getElementById('promoCode').value.trim().toUpperCase();
  if(!code) return toast('Code ရိုက်ထည့်ပါ',false);
  const r=await api('/api/redeem',{telegramId:me.telegramId,code});
  if(r.ok){me.balance=r.newBalance;document.getElementById('balNum').textContent=(r.newBalance||0).toLocaleString();toast(`🎉 +${r.amount.toLocaleString()} ကျပ် ရပြီ!`);document.getElementById('promoCode').value='';}else toast(r.error||'Error',false);
}

function goPlay(){location.href='play.html';}
init();
</script>
